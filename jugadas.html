  var zo=p.zOrder;if(!zo){zo=[];for(var zi=0;zi<=p.numP;zi++)zo.push(zi);}
  var bz=fr.ballZ||'front';
  var bp=fr.ball;
  BE=mkBall(bp.x,bp.y);BE.style.pointerEvents='none';
  if(bz==='back')SE.appendChild(BE);
  SE.appendChild(jL);
  if(bz==='front')SE.appendChild(BE);
  if(bz==='hidden')BE.style.display='none';
  for(var zi2=0;zi2<zo.length;zi2++){
    var idx=zo[zi2];
    var pos=fr.pos[idx];if(!pos)continue;
    var jg=mkJ(pos.x,pos.y,idx===0?'H':String(idx),p.numP);
    jL.appendChild(jg);JE[idx]=jg;
  }
  rA();
}

function rA(){
  var l=document.getElementById('ann-layer');if(!l)return;l.innerHTML='';
  var fr=PL[c].frames[cf];if(!fr||!fr.annotations)return;
  for(var i=0;i<fr.annotations.length;i++){
    var a=fr.annotations[i];
    var d=document.createElement('div');d.className='ann-el';
    d.style.left=a.xPct+'%';d.style.top=a.yPct+'%';
    d.style.fontWeight=a.bold?'bold':'normal';d.style.fontStyle=a.italic?'italic':'normal';
    d.style.fontSize=(a.size||16)+'px';d.style.color=a.color||'#fff';
    d.textContent=a.text;l.appendChild(d);
  }
}

function rUI(){
  var p=PL[c];
  // play tabs
  var tw=document.getElementById('tabwrap');tw.innerHTML='';
  for(var i=0;i<PL.length;i++){
    (function(idx){
      var b=document.createElement('button');b.className='vtab'+(idx===c?' on':'');
      b.textContent=PL[idx].name||'JUGADA';b.onclick=function(){sel(idx);};
      tw.appendChild(b);
    })(i);
  }
  // frame strip removed - navigate with buttons only
  // notes
  var ne=document.getElementById('play-notes');
  if(ne){if(p.notes&&p.notes.trim()){ne.textContent=p.notes;ne.style.display='block';}else ne.style.display='none';}
  // video thumbnails
  var ve=document.getElementById('play-vids');
  if(ve){
    ve.innerHTML='';
    var urls=p.videoUrls||[];
    urls.forEach(function(url){
      var m=url&&url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([^&\s?]+)/);
      if(!m)return;
      var id=m[1];
      var a=document.createElement('div');a.className='vthumb';
      (function(vid){a.onclick=function(){openVid(vid);};})(id);
      var img=document.createElement('img');
      img.src='https://img.youtube.com/vi/'+id+'/mqdefault.jpg';
      img.onerror=function(){a.style.display='none';};
      var ico=document.createElement('div');ico.className='vplay';ico.textContent='▶';
      a.appendChild(img);a.appendChild(ico);ve.appendChild(a);
    });
  }
}

function sel(i){c=i;cf=0;cancelAll();busy=false;paused=false;var b=document.getElementById('pb');if(b){b.textContent='\u25B6';b.disabled=false;}rUI();build();}
function selF(i){cf=Math.max(0,Math.min(i,PL[c].frames.length-1));rUI();build();}

function sl(ms){return new Promise(function(r){var t=setTimeout(function(){slv=slv.filter(function(x){return x!==r;});r();},ms);tm.push(t);slv.push(r);});}
function slP(ms){return sl(ms).then(function(){return new Promise(function(r){function chk(){if(!paused||!busy){r();return;}setTimeout(chk,80);}chk();});});}
function cancelAll(){tm.forEach(function(t){clearTimeout(t);});tm=[];slv.forEach(function(r){r();});slv=[];}

function animJ(i,tx,ty,ms){
  return new Promise(function(rs){
    var from=gJ(i),fx=from.x,fy=from.y;
    var t0=performance.now();
    function tick(now){
      try{var t=Math.min((now-t0)/ms,1),et=t<.5?2*t*t:-1+(4-2*t)*t;
        sJ(i,fx+(tx-fx)*et,fy+(ty-fy)*et);
        t<1?requestAnimationFrame(tick):rs();
      }catch(e){rs();}
    }
    requestAnimationFrame(tick);
  });
}
function animB(from,to,ms){
  return new Promise(function(rs){
    var fx=from.x,fy=from.y;
    var t0=performance.now();
    function tick(now){
      try{var t=Math.min((now-t0)/ms,1),et=1-(1-t)*(1-t);
        sB(fx+(to.x-fx)*et,fy+(to.y-fy)*et);
        t<1?requestAnimationFrame(tick):rs();
      }catch(e){rs();}
    }
    requestAnimationFrame(tick);
  });
}

function doPlay(){
  if(busy)return;busy=true;paused=false;
  var btn=document.getElementById('pb');if(btn)btn.textContent='\u23F8';
  var p=PL[c];
  p.frames[0].pos.forEach(function(pos,i){sJ(i,pos.x,pos.y);});
  sB(p.frames[0].ball.x,p.frames[0].ball.y);
  cf=0;rUI();
  sl(300).then(function loop(f){ if(!busy)return;
    if(f>=p.frames.length){
      busy=false;paused=false;
      cf=0;try{build();rUI();rA();}catch(e){}
      var b=document.getElementById('pb');if(b){b.textContent='\u25B6';b.disabled=false;}
      return;
    }
    var pv=p.frames[f-1],cv=p.frames[f];
    var anims=[];
    for(var i=0;i<=p.numP;i++){
      var pp=pv.pos[i],cp=cv.pos[i];
      if(pp&&cp&&(Math.abs(pp.x-cp.x)>2||Math.abs(pp.y-cp.y)>2))anims.push(animJ(i,cp.x,cp.y,Math.round(850/spd)));
    }
    var pb2=pv.ball,cb=cv.ball;
    if(pb2&&cb&&(Math.abs(pb2.x-cb.x)>2||Math.abs(pb2.y-cb.y)>2))anims.push(animB(pb2,cb,Math.round(700/spd)));
    if(!busy)return; Promise.all(anims).then(function(){
      return slP(Math.round(300/spd));
    }).then(function(){
      cf=f;rUI();rA();
      return slP(Math.round(500/spd));
    }).then(function(){loop(f+1);}).catch(function(){busy=false;});
  }.bind(null,1));
}
function tog(){if(!busy){doPlay();return;}paused=!paused;var b=document.getElementById('pb');if(b)b.textContent=paused?'\u25B6':'\u23F8';}
function fu(){cancelAll();busy=false;paused=false;var b=document.getElementById('pb');if(b){b.textContent='\u25B6';b.disabled=false;}}

function openVid(id){
  var sw=window.screen.availWidth,sh=window.screen.availHeight;
  var pw=560,ph=380,px=sw-pw-20,py=sh-ph-60;
  var pop=window.open('https://www.youtube.com/watch?v='+id+'&autoplay=1','ctm-yt','width='+pw+',height='+ph+',left='+px+',top='+py+',toolbar=no,menubar=no,scrollbars=no,resizable=yes');
  if(!pop)window.open('https://www.youtube.com/watch?v='+id,'_blank');
}
sel(0);
